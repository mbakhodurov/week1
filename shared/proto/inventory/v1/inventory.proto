syntax = "proto3";

// Package ufo.v1 содержит API для работы с наблюдениями НЛО
package ufo.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "google/protobuf/empty.proto";
import "google/api/annotations.proto";
import "validate/validate.proto";

//option go_package = "mbakhodurov.library.v1;librarypb"
option go_package = "github.com/mbakhodurov/week_1/grpc/pkg/proto/inventory/v1;inventory";

service InventoryService {
  rpc GetPart(GetPartRequest) returns (GetPartResponse){
    option(google.api.http)={
      get: "/api/v1/inventory/{uuid}"
    };
  }
  
  
}

message GetPartRequest {
  string uuid = 1;
}

message GetPartResponse  {
  // sighting данные наблюдения
  Part part = 1;
}

message Part {
  string uuid = 1;
  string name = 2;
  string description = 3 [(validate.rules).string = {min_len: 1, max_len: 50}];
  double price = 4;
  int64 stock_quantity = 5;
  Category category = 6;
  Dimensions dimensions = 7;
  Manufacturer manufacturer = 8;
  repeated string tags = 9;
  map<string, Value> metadata = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

enum Category {
  CATEGORY_UNKNOWN = 0;
  ENGINE = 1;
  FUEL = 2;
  PORTHOLE = 3;
  WING = 4;
}

message Dimensions {
  double length = 1;
  double width = 2;
  double height = 3;
  double weight = 4;
}

message Manufacturer {
  string name = 1;
  string country = 2;
  string website = 3;
}

message Value {
  oneof kind {
    string string_value = 1;
    int64 int64_value = 2;
    double double_value = 3;
    bool bool_value = 4;
  }
}